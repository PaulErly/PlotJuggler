name: windows-build

on:
  workflow_dispatch:
  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-2019
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Conan
        uses: conan-io/setup-conan@v1
        with:
          cache_packages: false

      - name: Install Qt 5.15.2
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          arch: 'win64_msvc2019_64'
          tools: 'tools_ifw'
          add-tools-to-path: 'true'
          cache: 'true'
          dir: ${{ github.workspace }}/qt_installation

      - name: Conan install
        shell: pwsh
        run: |
          conan install . -of build --build=missing -pr:b=default -s build_type=Release -s compiler.cppstd=17

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake --preset conan-default -S . -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/install" `
            -DPJ_INSTALLATION="windows" `
            -DPJ_PLUGINS_DIRECTORY="bin"

      - name: Build install target
        shell: pwsh
        run: |
          cmake --build build --config Release --target install

      - name: Upload install artifact
        uses: actions/upload-artifact@v7
        with:
          name: plotjuggler-windows
          path: install
