name: windows-build

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-2019
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Conan
        uses: conan-io/setup-conan@v1
        with:
          cache_packages: false

      - name: Detect Conan cache location
        shell: pwsh
        run: |
          $version = conan --version
          Write-Host $version
          if ($version -match 'Conan version\s+(\d+)') {
            "CONAN_MAJOR=$($Matches[1])" | Out-File -FilePath $env:GITHUB_ENV -Append
          } else {
            Write-Error "Unable to parse Conan version: $version"
            exit 1
          }

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.conan
            ~/.conan2
          key: >-
            ${{ runner.os }}-conan${{ env.CONAN_MAJOR }}-${{ hashFiles('conanfile.txt', 'conanfile.py', 'conandata.yml', 'CMakeLists.txt', 'plotjuggler_app/CMakeLists.txt', 'plotjuggler_plugins/CMakeLists.txt', 'cmake/**/*.cmake') }}
          restore-keys: |
            ${{ runner.os }}-conan${{ env.CONAN_MAJOR }}-
            ${{ runner.os }}-conan-

      - name: Install Qt 5.15.2
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          arch: 'win64_msvc2019_64'
          tools: 'tools_ifw'
          add-tools-to-path: 'true'
          cache: 'true'
          dir: ${{ github.workspace }}/qt_installation

      - name: Conan install
        shell: pwsh
        run: |
          conan install . -of build --build=missing -pr:b=default -s build_type=Release -s compiler.cppstd=17

      - name: Configure CMake
        shell: pwsh
        run: |
          $cmd = @'
          cmake --preset conan-default -S . -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/install" `
            -DPJ_INSTALLATION="windows" `
            -DPJ_PLUGINS_DIRECTORY="bin"
          '@
          Write-Host "Configure command:"
          Write-Host $cmd
          cmake --preset conan-default -S . -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/install" `
            -DPJ_INSTALLATION="windows" `
            -DPJ_PLUGINS_DIRECTORY="bin"

      - name: Print build diagnostics
        shell: pwsh
        run: |
          Write-Host "Runner OS: $env:RUNNER_OS"
          cmake --version
          conan --version
          $vcvars = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\2019\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          if (-not (Test-Path $vcvars)) {
            $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
            $vsRoot = & $vswhere -latest -products * -property installationPath
            if ($vsRoot) {
              $vcvars = Join-Path $vsRoot "VC\Auxiliary\Build\vcvars64.bat"
            }
          }
          if (Test-Path $vcvars) {
            cmd /c "call `"$vcvars`" >nul && where cl && cl"
          } else {
            Write-Host "vcvars64.bat not found"
          }
          if (Get-Command qmake -ErrorAction SilentlyContinue) {
            qmake -query QT_INSTALL_PREFIX
          } else {
            Write-Host "qmake not found on PATH"
          }
          if (Test-Path build\CMakeCache.txt) {
            Select-String -Path build\CMakeCache.txt -Pattern '^CMAKE_GENERATOR:'
          }

      - name: Build install target
        shell: pwsh
        run: |
          $buildCmd = 'cmake --build build --config Release --target install --verbose'
          Write-Host "Build command:"
          Write-Host $buildCmd
          cmake --build build --config Release --target install --verbose

      - name: Upload install artifact
        uses: actions/upload-artifact@v7
        with:
          name: plotjuggler-windows
          path: install
